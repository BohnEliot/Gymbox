<h2 mat-dialog-title class="text-warning fw-bold">
  {{ data.title }}
</h2>

<div mat-dialog-content>
  <p class="text-light-emphasis mb-0">
    {{ data.message }}
  </p>
</div>

<div mat-dialog-actions align="end" class="mt-3">
  <button class="btn btn-outline-light me-2" (click)="megse()">
    Mégse
  </button>

  <button class="btn btn-warning text-dark fw-bold" (click)="igen()">
    Törlés
  </button>
</div>
