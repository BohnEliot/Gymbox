<div class="container py-5 bg-dark ">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5 content">
      <div class="card shadow-sm">
        <div class="card-body p-4 bg-dark text-secondary">

          <h3 class="card-title text-center mb-4">Gymbox</h3>

          <div class="mb-3">
            <label for="loginEmail" class="form-label">Email cím</label>
            <input
              type="email"
              id="loginEmail"
              class="form-control"
              placeholder="pelda@email.hu"
              [(ngModel)]="felhasznaloEmail"
              name="felhasznaloEmail"
            >
          </div>

          <div class="mb-3">
            <label for="loginPassword" class="form-label">Jelszó</label>
            <input
              type="password"
              id="loginPassword"
              class="form-control"
              placeholder="Jelszó"
              [(ngModel)]="felhasznaloJelszo"
              name="felhasznaloJelszo"
            >
          </div>

          <div class="d-grid mb-3">
            <button class="btn btn-warning" (click)="loginBtn()">
              Bejelentkezés
            </button>
          </div>

          

        </div>
      </div>

      <p class="text-center text-muted mt-3">&copy; 2026 Gymbox</p>

    </div>
  </div>
</div>
